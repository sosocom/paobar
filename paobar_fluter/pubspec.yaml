name: paobar
description: "泡吧吉他谱 · Flutter 多端应用"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # 状态管理
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # 不可变模型 / 序列化
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 网络
  dio: ^5.7.0
  retrofit: ^4.4.1
  pretty_dio_logger: ^1.4.0

  # 依赖注入
  get_it: ^7.7.0

  # 路由
  go_router: ^14.6.2

  # 存储
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTML 解析（谱面渲染器）
  html: ^0.15.5

  # UI / 平台
  cached_network_image: ^3.4.1
  lucide_icons: ^0.257.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.2

  # 工具
  intl: ^0.19.0
  logger: ^2.5.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.5
  hive_generator: ^2.0.1

  # 测试
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # Lint
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/chords/

  # 字体文件由用户自行补充到 assets/fonts/，此处预留声明
  # fonts:
  #   - family: HiraginoSansGB
  #     fonts:
  #       - asset: assets/fonts/HiraginoSansGB.ttc
