# Nginx 配置建议 — 支持 PWA + 解决前端缓存问题
# 位置: /etc/nginx/sites-available/paobar.conf 或 /etc/nginx/conf.d/paobar.conf
#
# 关键修复点（相对于传统 SPA 配置）：
#   1. Service Worker (sw.js / workbox-*.js) 必须 no-cache，否则老版 SW 永远卡住用户
#   2. manifest.webmanifest 必须 no-cache，方便更新应用名/图标
#   3. index.html 保持 no-cache，新版上线立即生效
#   4. 其他 js/css 带 hash，可继续 1 年强缓存
#   5. SPA fallback：所有未命中的路由回退到 index.html

server {
    listen 80;
    server_name paobar.com www.paobar.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name paobar.com www.paobar.com;

    # SSL 证书
    ssl_certificate /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;

    # 静态文件根目录
    root /opt/nginx/html/paobar/dist;
    index index.html;

    # ========== PWA 相关：必须 no-cache ==========

    # Service Worker 入口：绝对不能被浏览器 / CDN 长期缓存
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        # 确保以 JS 正确类型返回
        types { application/javascript js; }
        default_type application/javascript;
    }

    # Workbox 运行时辅助脚本（vite-plugin-pwa 产出的 workbox-xxx.js）
    # 命名是 hash 化的，但为安全起见也按非缓存处理
    location ~ ^/workbox-.*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        types { application/javascript js; }
        default_type application/javascript;
    }

    # Web App Manifest
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
    }

    # index.html 禁用缓存（重要！）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ========== 普通静态资源：带 hash，1 年强缓存 ==========

    # 注意：不要在这里匹配 sw.js / workbox-*.js / manifest.webmanifest，
    # 上面的 location 已经先命中它们。
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 带 hash 的 JS（vite 产出在 /assets/ 下）才走强缓存
    location ~* ^/assets/.*\.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ========== SPA 路由与 API ==========

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 代理
    location /api {
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========== Gzip ==========

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/manifest+json
        image/svg+xml;
}
